- name: Uninstall Adobe Acrobat DC
  hosts: Win_Hosts
  gather_facts: false
  ignore_unreachable: true

  vars:
    ansible_remote_tmp: 'C:\Windows\Temp'

  tasks:
    - name: Check if Adobe Acrobat is installed via MSI or Chocolatey
      ansible.builtin.raw: |
        chcp 65001 | Out-Null
        [Console]::OutputEncoding = [System.Text.Encoding]::UTF8
        $msi = Get-Package -Name '*Adobe Acrobat*' -ErrorAction SilentlyContinue
        $choco = choco list --local-only adobereader 2>$null
        if ($msi) {
          Write-Output "FOUND_MSI:$($msi.Name):$($msi.Version):$($msi.TagId)"
        } elseif ($choco -match 'adobereader') {
          Write-Output "FOUND_CHOCO"
        } else {
          Write-Output "NOT_FOUND"
        }
      register: acrobat_check
      changed_when: false
      ignore_errors: true

    - name: Not installed message
      ansible.builtin.debug:
        msg: "Adobe Acrobat не найден — удаление не требуется"
      when: >
        acrobat_check.stdout is not defined or
        'NOT_FOUND' in acrobat_check.stdout

    - name: Uninstall Adobe Acrobat via MSI
      ansible.builtin.raw: |
        chcp 65001 | Out-Null
        [Console]::OutputEncoding = [System.Text.Encoding]::UTF8
        $app = Get-Package -Name '*Adobe Acrobat*' -ErrorAction SilentlyContinue
        if ($app) {
          $guid = $app.TagId
          Write-Output "Удаляем: $($app.Name) $($app.Version)"
          Start-Process msiexec.exe -ArgumentList "/x $guid /quiet /norestart" -Wait
          Write-Output "UNINSTALLED"
        }
      register: msi_uninstall
      when: >
        acrobat_check.stdout is defined and
        'FOUND_MSI' in acrobat_check.stdout
      changed_when: "'UNINSTALLED' in msi_uninstall.stdout"
      ignore_errors: true

    - name: Uninstall Adobe Acrobat via Chocolatey
      ansible.builtin.raw: |
        chcp 65001 | Out-Null
        [Console]::OutputEncoding = [System.Text.Encoding]::UTF8
        choco uninstall adobereader -y --no-progress
        Write-Output "UNINSTALLED"
      register: choco_uninstall
      when: >
        acrobat_check.stdout is defined and
        'FOUND_CHOCO' in acrobat_check.stdout
      changed_when: "'UNINSTALLED' in choco_uninstall.stdout"
      ignore_errors: true

    - name: Show MSI uninstall result
      ansible.builtin.debug:
        msg: "{{ msi_uninstall.stdout_lines }}"
      when: msi_uninstall.stdout_lines is defined

    - name: Show Chocolatey uninstall result
      ansible.builtin.debug:
        msg: "{{ choco_uninstall.stdout_lines }}"
      when: choco_uninstall.stdout_lines is defined

    - name: Clean up leftover folders
      ansible.builtin.raw: |
        chcp 65001 | Out-Null
        [Console]::OutputEncoding = [System.Text.Encoding]::UTF8
        $paths = @(
          "C:\Program Files\Adobe\Acrobat DC",
          "C:\Program Files (x86)\Adobe\Acrobat Reader DC",
          "C:\Program Files\Adobe\Acrobat Reader DC"
        )
        foreach ($path in $paths) {
          if (Test-Path $path) {
            Remove-Item -Path $path -Recurse -Force
            Write-Output "Удалена папка: $path"
          }
        }
      register: cleanup
      when: >
        acrobat_check.stdout is defined and
        'NOT_FOUND' not in acrobat_check.stdout
      changed_when: "'Удалена папка' in cleanup.stdout"
      ignore_errors: true

    - name: Show cleanup result
      ansible.builtin.debug:
        msg: "{{ cleanup.stdout_lines }}"
      when: cleanup.stdout_lines is defined