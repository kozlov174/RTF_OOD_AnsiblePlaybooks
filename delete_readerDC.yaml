- name: Uninstall Adobe Acrobat DC
  hosts: Win_Hosts
  gather_facts: false
  ignore_unreachable: true

  vars:
    ansible_remote_tmp: 'C:\Windows\Temp'

  tasks:
    - name: Check if Adobe Acrobat is installed
      ansible.builtin.raw: |
        chcp 65001 | Out-Null
        [Console]::OutputEncoding = [System.Text.Encoding]::UTF8
        $app = Get-ItemProperty "HKLM:\Software\Microsoft\Windows\CurrentVersion\Uninstall\*" |
               Where-Object { $_.DisplayName -like '*Adobe Acrobat*' } |
               Select-Object -First 1
        if ($app) {
          Write-Output "FOUND:$($app.DisplayName):$($app.DisplayVersion):$($app.PSChildName)"
        } else {
          Write-Output "NOT_FOUND"
        }
      register: acrobat_check
      changed_when: false
      ignore_errors: true

    - name: Not installed message
      ansible.builtin.debug:
        msg: "Adobe Acrobat не найден — удаление не требуется"
      when: "'NOT_FOUND' in acrobat_check.stdout"

    - name: Uninstall Adobe Acrobat via msiexec
      ansible.builtin.raw: |
        chcp 65001 | Out-Null
        [Console]::OutputEncoding = [System.Text.Encoding]::UTF8
        $guid = (Get-ItemProperty "HKLM:\Software\Microsoft\Windows\CurrentVersion\Uninstall\*" |
                 Where-Object { $_.DisplayName -like '*Adobe Acrobat*' } |
                 Select-Object -First 1).PSChildName
        Write-Output "Удаляем GUID: $guid"
        cmd /c "msiexec /x $guid /quiet /norestart"
        Start-Sleep -Seconds 10
        $check = Get-ItemProperty "HKLM:\Software\Microsoft\Windows\CurrentVersion\Uninstall\*" |
                 Where-Object { $_.DisplayName -like '*Adobe Acrobat*' }
        if (-not $check) {
          Write-Output "UNINSTALLED"
        } else {
          Write-Output "STILL_PRESENT"
        }
      register: msi_uninstall
      when: "'FOUND' in acrobat_check.stdout"
      changed_when: "'UNINSTALLED' in msi_uninstall.stdout"
      failed_when: "'STILL_PRESENT' in msi_uninstall.stdout"
      ignore_errors: true

    - name: Show uninstall result
      ansible.builtin.debug:
        msg: "{{ msi_uninstall.stdout_lines }}"
      when: msi_uninstall.stdout_lines is defined

    - name: Clean up leftover Windows folders
      ansible.builtin.raw: |
        chcp 65001 | Out-Null
        [Console]::OutputEncoding = [System.Text.Encoding]::UTF8
        $paths = @(
          "C:\Program Files\Adobe\Acrobat DC",
          "C:\Program Files (x86)\Adobe\Acrobat Reader DC",
          "C:\Program Files\Adobe\Acrobat Reader DC"
        )
        foreach ($path in $paths) {
          if (Test-Path $path) {
            Remove-Item -Path $path -Recurse -Force
            Write-Output "Удалена папка: $path"
          }
        }
      register: folder_cleanup
      when: "'FOUND' in acrobat_check.stdout"
      changed_when: "'Удалена папка' in folder_cleanup.stdout"
      ignore_errors: true

    - name: Show folder cleanup result
      ansible.builtin.debug:
        msg: "{{ folder_cleanup.stdout_lines }}"
      when: folder_cleanup.stdout_lines is defined

    - name: Clean up Chocolatey package record
      ansible.builtin.raw: |
        chcp 65001 | Out-Null
        [Console]::OutputEncoding = [System.Text.Encoding]::UTF8
        $paths = @(
          "C:\ProgramData\chocolatey\lib\adobereader",
          "C:\ProgramData\chocolatey\lib-bad\adobereader"
        )
        foreach ($path in $paths) {
          if (Test-Path $path) {
            Remove-Item -Path $path -Recurse -Force
            Write-Output "Удалена папка Chocolatey: $path"
          }
        }
      register: choco_cleanup
      when: "'FOUND' in acrobat_check.stdout"
      changed_when: "'Удалена папка' in choco_cleanup.stdout"
      ignore_errors: true

    - name: Show Chocolatey cleanup result
      ansible.builtin.debug:
        msg: "{{ choco_cleanup.stdout_lines }}"
      when: choco_cleanup.stdout_lines is defined