- name: Install Adobe Acrobat DC via Chocolatey
  hosts: Win_Hosts
  gather_facts: false
  ignore_unreachable: true

  vars:
    acrobat_version: "2026.1.21367"
    ansible_remote_tmp: 'C:\Windows\Temp'

  tasks:
    - name: Check if Chocolatey is installed
      ansible.builtin.raw: |
        chcp 65001 | Out-Null
        [Console]::OutputEncoding = [System.Text.Encoding]::UTF8
        choco --version
      register: choco_check
      ignore_errors: true
      changed_when: false

    - name: Install Chocolatey if not present
      ansible.builtin.raw: |
        chcp 65001 | Out-Null
        [Console]::OutputEncoding = [System.Text.Encoding]::UTF8
        Set-ExecutionPolicy Bypass -Scope Process -Force
        [System.Net.ServicePointManager]::SecurityProtocol = [System.Net.ServicePointManager]::SecurityProtocol -bor 3072
        iex ((New-Object System.Net.WebClient).DownloadString('https://community.chocolatey.org/install.ps1'))
      when: choco_check.rc is not defined or choco_check.rc != 0
      register: choco_install

    - name: Check if Adobe Acrobat is already installed via MSI or Chocolatey
      ansible.builtin.raw: |
        chcp 65001 | Out-Null
        [Console]::OutputEncoding = [System.Text.Encoding]::UTF8
        $msi = Get-Package -Name '*Adobe Acrobat*' -ErrorAction SilentlyContinue
        $choco = choco list --local-only adobereader 2>$null
        if ($msi) {
          Write-Output "FOUND_MSI:$($msi.Name):$($msi.Version)"
        } elseif ($choco -match 'adobereader') {
          Write-Output "FOUND_CHOCO"
        } else {
          Write-Output "NOT_FOUND"
        }
      register: acrobat_check
      changed_when: false
      ignore_errors: true

    - name: Already installed message
      ansible.builtin.debug:
        msg: "Adobe Acrobat уже установлен: {{ acrobat_check.stdout_lines }}"
      when: >
        acrobat_check.stdout is defined and
        ('FOUND_MSI' in acrobat_check.stdout or 'FOUND_CHOCO' in acrobat_check.stdout)

    - name: Install Adobe Acrobat DC via Chocolatey
      ansible.builtin.raw: |
        chcp 65001 | Out-Null
        [Console]::OutputEncoding = [System.Text.Encoding]::UTF8
        choco install adobereader --version={{ acrobat_version }} -y --no-progress --ignore-checksums
      register: acrobat_install
      when: >
        acrobat_check.stdout is not defined or
        ('NOT_FOUND' in acrobat_check.stdout)
      changed_when: "'already installed' not in acrobat_install.stdout"
      ignore_errors: true

    - name: Show install output
      ansible.builtin.debug:
        msg: "{{ acrobat_install.stdout_lines }}"
      when: acrobat_install.stdout_lines is defined